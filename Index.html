<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Love Interactive</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-hearts"></div>

<!-- LOVE -->
<div id="scene">

  <div id="heart-container">

    <div id="heart-wrapper">

      <img
        id="heart"
        src="assets/heart.png"
        alt="heart"
      >

      <img
        id="face"
        src="assets/sad.png"
        alt="face"
      >

    </div>

    <div id="clickInfo">
      Sentuh Love ❤️
    </div>

  </div>

</div>

<!-- PARTIKEL -->
<div id="particles"></div>

<!-- HALAMAN PESAN -->
<div id="memoryPage" class="hidden">

  <div class="memory-box">

    <h1>💖 Untuk Kamu 💖</h1>

    <p class="intro">
      Semua kenangan manis tersimpan di sini.
    </p>

    <div class="message-list">

      <div class="message-card">
        Terima kasih sudah menjadi bagian terindah dalam hidupku.
      </div>

      <div class="message-card">
        Senyummu selalu membuat hariku lebih baik.
      </div>

      <div class="message-card">
        Semoga semua impianmu tercapai satu per satu.
      </div>

      <div class="message-card">
        Aku akan selalu mendukungmu.
      </div>

    </div>

    <h2>📸 Kolase Kenangan</h2>

    <div class="gallery">

      <img src="photos/foto1.jpg" alt="">
      <img src="photos/foto2.jpg" alt="">
      <img src="photos/foto3.jpg" alt="">
      <img src="photos/foto4.jpg" alt="">

    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
